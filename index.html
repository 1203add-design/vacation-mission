<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>假日實驗室 v16.13 - 敏捷導航版 (行動聚合)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;700&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2d3436; 
            --morning-bg: #ffeaa7; --morning-text: #d35400;
            --afternoon-bg: #74b9ff; --afternoon-text: #0984e3; 
            --evening-bg: #a29bfe; --evening-text: #6c5ce7;
            --accent: #00cec9; --success: #00b894; --warning: #fab1a0;
            --ep-color: #f1c40f; --bg-pattern: #f8fafc;
        }

        body { 
            font-family: 'Urbanist', 'Noto Sans TC', sans-serif; 
            background-color: var(--bg-pattern); 
            margin: 0; padding: 0; color: var(--primary); 
            user-select: none;
            height: 100dvh;
            overflow: hidden;
        }

        .tab-nav { 
            position: fixed; top: 0; left: 0; width: 100%; z-index: 1000; box-sizing: border-box;
            height: 60px;
            display: flex; gap: 8px; justify-content: center; align-items: center;
            padding: 0 10px; background: rgba(255, 255, 255, 0.88); 
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            overflow-x: auto; white-space: nowrap;
        }

        .ep-nav-item {
            display: flex; align-items: center; gap: 6px; background: #fff3cd;
            padding: 6px 14px; border-radius: 50px; border: 1px solid #ffeaa7;
        }

        .ep-nav-score { font-size: 1.15rem; font-weight: 900; color: #d35400; }

        .tab-btn { 
            padding: 8px 18px; border-radius: 50px; font-weight: 700; 
            font-size: 1.05rem; cursor: pointer; border: 2px solid transparent; 
            background: #f1f2f6; color: #636e72; transition: all 0.3s ease;
        }

        .tab-btn.active { 
            background: var(--accent); color: white; 
            box-shadow: 0 6px 15px rgba(0,206,201,0.25); transform: translateY(-1px);
        }

        .main-wrapper { 
            max-width: 950px; 
            margin: 60px auto 0; 
            padding: 20px 15px 20px 15px; 
            height: calc(100dvh - 60px);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            box-sizing: border-box;
        }

        .container { 
            background: rgba(255, 255, 255, 0.98); 
            padding: 25px; border-radius: 25px; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.04); border: 1px solid #fff;
            margin-bottom: 25px;
        }

        .quote-box { 
            min-height: 45px; text-align: center; color: var(--success); 
            font-weight: 700; font-size: 1.1rem; margin-bottom: 15px;
            white-space: pre-line;
        }

        .date-navigator { 
            display: flex; justify-content: space-between; align-items: center; 
            background: #fdfdfd; padding: 12px 20px; border-radius: 20px; 
            border: 2px solid #f1f2f6; margin-bottom: 20px;
        }

        .current-date-title { font-size: 1.35rem; font-weight: 900; color: #0984e3; margin: 0; }
        
        .time-config { display: flex; gap: 12px; margin-bottom: 20px; justify-content: center; flex-wrap: wrap; }
        .time-capsule { 
            display: flex; align-items: center; gap: 8px;
            padding: 8px 16px; border-radius: 50px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.02); font-weight: bold; font-size: 0.95rem;
        }
        .time-inputs-row { display: flex; align-items: center; gap: 3px; }
        .time-capsule input { width: 45px; border: none; text-align: center; background: rgba(255,255,255,0.5); border-radius: 5px; font-weight: bold; padding: 2px; font-size: 0.95rem; }

        .monitor-panel { margin-bottom: 25px; }
        .total-time-text { text-align: center; margin-bottom: 5px; font-weight: bold; color: #636e72; font-size: 0.9rem; }
        .bar-container { 
            height: 40px; background: #dfe6e9; border-radius: 20px; 
            overflow: hidden; display: flex; position: relative; border: 4px solid #fff; box-shadow: 0 6px 15px rgba(0,0,0,0.05); 
        }
        .bar-tasks { height: 100%; background: linear-gradient(135deg, #74b9ff, #0984e3); width: 0%; transition: 0.6s; display: flex; align-items: center; justify-content: center; color: white; font-size: 0.9rem; font-weight: bold; overflow: hidden; white-space: nowrap; }
        .bar-free { height: 100%; background: linear-gradient(135deg, #55efc4, #00b894); width: 100%; transition: 0.6s; display: flex; align-items: center; justify-content: center; color: #2d3436; font-weight: bold; font-size: 0.9rem; overflow: hidden; white-space: nowrap; }
        
        .period-section { margin-bottom: 20px; border-radius: 20px; padding: 15px 15px 5px 15px; }
        .section-1 { background: linear-gradient(to bottom right, #fffdf2, #fff9e6); border: 2px dashed #ffeaa7; }
        .section-2 { background: linear-gradient(to bottom right, #f4fbff, #e9f5ff); border: 2px dashed #74b9ff; }
        .section-3 { background: linear-gradient(to bottom right, #f8f7ff, #f1f0ff); border: 2px dashed #a29bfe; }
        .section-title-period { font-size: 1.1rem; font-weight: bold; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
        .period-rem { font-size: 0.85rem; padding: 4px 10px; border-radius: 12px; font-weight: bold; }

        .grid-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; }
        .list-item { 
            display: flex; align-items: center; gap: 8px; padding: 10px 12px; 
            background: #fff; border-radius: 12px; border-left: 6px solid #b2bec3; 
            box-shadow: 0 2px 6px rgba(0,0,0,0.02); flex-wrap: wrap;
        }
        
        .list-item.completed { opacity: 0.5; filter: grayscale(0.6); }
        .list-item.completed input[type="text"], 
        .list-item.completed input[type="number"], 
        .list-item.completed select,
        .list-item.completed textarea { 
            text-decoration: line-through; color: #b2bec3; pointer-events: none; 
        }

        .list-item.completed .check-box,
        .list-item.completed .ex-check-box { 
            pointer-events: auto !important; 
        }

        .check-box { width: 22px; height: 22px; cursor: pointer; flex-shrink: 0; accent-color: #00b894; }
        .type-select { width: 68px; background: #f8f9fa; flex-shrink: 0; }
        .name-select { width: 70px; flex-shrink: 0; }
        .progress-field { flex: 3; min-width: 110px; } 
        .task-stage-input { flex: 2; min-width: 90px; border-color: #ffeaa7; } 
        .task-time-input { width: 40px; text-align: center; color: #d63031; flex-shrink: 0; }
        .period-select { width: 65px; background: #f1f2f6; color: #636e72; flex-shrink: 0; padding: 6px 4px; }
        .btn-del { background: #ff7675; color: white; border: none; border-radius: 8px; width: 30px; height: 30px; cursor: pointer; font-weight: bold; flex-shrink: 0; transition: 0.2s; }
        .btn-del:active { transform: scale(0.9); }

        .proj-container { display: none; align-items: center; gap: 3px; flex: 2; min-width: 90px; }
        .proj-val-input { flex: 1; padding: 6px; border: 1px solid #00cec9; border-radius: 8px; font-weight: bold; color:#0984e3; text-align: center; min-width: 50px; }

        @media (max-width: 768px) {
    .list-item { flex-wrap: wrap; padding: 12px; gap: 8px; }
    .name-select { flex-grow: 1; width: auto; }
    .progress-field { flex-basis: 100%; order: 3; margin-top: 2px; }
    .task-stage-input { flex: 1; order: 4; }
    .proj-container { flex: 1; order: 5; }
    .task-time-input { order: 6; }
    .period-select { order: 7; }
    .btn-del { order: 8; }
    
    .tab-btn { padding: 6px 10px; font-size: 0.95rem; }
    .ep-nav-item { padding: 4px 10px; }
    .ep-nav-score { font-size: 1rem; }
    .tab-nav { gap: 4px; padding: 0 4px; justify-content: flex-start; }
    
    .settings-list li { flex-direction: column; align-items: flex-start; gap: 8px; }
    .settings-list li > div:first-child { white-space: normal; flex-wrap: wrap; width: 100%; }
    .settings-list li > div:last-child { width: 100%; justify-content: flex-end; }
    #project-list li > div:first-child { flex-direction: column; align-items: flex-start !important; gap: 8px; }
    #project-list li > div:first-child > div:last-child { width: 100%; justify-content: flex-end; }
}

        .ex-check-box { width: 22px; height: 22px; cursor: pointer; flex-shrink: 0; accent-color: #e17055; }
        .ex-cost { width: 55px; text-align: center; font-size: 0.85rem !important; padding: 6px 4px !important; }

        .calendar-month-block { background: #fff; border: 2px solid #dfe6e9; border-radius: 15px; padding: 15px; margin-bottom: 20px; }
        .calendar-month-title { font-size: 1.2rem; color: #2d3436; border-bottom: 2px dashed #b2bec3; padding-bottom: 10px; margin-top: 0; margin-bottom: 15px; font-weight: bold; text-align: center; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .cal-header { text-align: center; font-weight: bold; color: #636e72; font-size: 0.9rem; padding-bottom: 5px; }
        .cal-day { border: 2px solid #f1f2f6; border-radius: 10px; padding: 10px 5px; text-align: center; font-weight: bold; cursor: pointer; transition: 0.2s; min-height: 45px; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #fff; }
        .cal-day.empty { visibility: hidden; }
        .cal-day:hover { transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .cal-day.status-none { background: #fff; color: #2d3436; }
        .cal-day.status-planned { background: #e9f5ff; border-color: #74b9ff; color: #0984e3; }
        .cal-day.status-done { background: #e8f8f5; border-color: #00cec9; color: #00b894; }
        .cal-day.active { box-shadow: 0 0 0 3px #fdcb6e; }

        .project-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 15px; margin-top: 15px; }
        .project-card { background: white; border-radius: 18px; padding: 15px; border: 1px solid #f1f2f6; border-left: 6px solid var(--afternoon-text); box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .project-card.achieved { border-color: var(--success); animation: glow 2s infinite; }
        @keyframes glow { 0%, 100% { box-shadow: 0 0 5px rgba(0,184,148,0.2); } 50% { box-shadow: 0 0 15px rgba(0,184,148,0.4); } }
        
        .fame-card { background: linear-gradient(135deg, #fff9e6, #fff3cd); border: 2px solid #f1c40f; padding: 12px 20px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(241,196,15,0.1); }
        .fame-title { color: #d35400; font-size: 1.15rem; font-weight: 900; margin: 0; }

        input, select, textarea { border: 1px solid #dfe6e9; border-radius: 8px; padding: 6px 8px; font-family: inherit; font-size: 0.95rem; font-weight: bold; color: var(--primary); }
        
        .settings-date-range { background: #e9f5ff; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 2px solid #74b9ff; text-align: center; font-weight: bold; }
        .settings-date-range input { padding: 6px; border-radius: 8px; border: 1px solid #dfe6e9; margin: 0 5px; }
        .domain-setting-block { background: #fff; padding: 18px; border-radius: 12px; margin-bottom: 15px; border: 2px solid #dfe6e9; }
        .domain-title { color: #0984e3; margin-top: 0; margin-bottom: 12px; border-bottom: 2px dashed #74b9ff; padding-bottom: 8px; font-size: 1.2rem; }
        
        .settings-input-group { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; align-items: center; }
        .settings-input-group input.opt-name { flex: 2; padding: 10px; border: 1px solid #dfe6e9; border-radius: 8px; min-width: 150px; }
        .settings-input-group input.opt-memo { flex: 1.5; padding: 10px; border: 1px solid #dfe6e9; border-radius: 8px; background: #fdfdfd; min-width: 100px; }
        
        .settings-list { list-style: none; padding: 0; margin: 0; }
        .settings-list li { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 10px 12px; background: #f1f2f6; border-radius: 8px; 
            margin-bottom: 8px; font-weight: bold; border-left: 4px solid #b2bec3; 
            flex-wrap: nowrap; gap: 10px; overflow: hidden;
        }
        .settings-list li > div:first-child { display: flex; align-items: center; gap: 8px; flex-grow: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        .settings-list li > div:last-child { display: flex; gap: 5px; flex-shrink: 0; }
        .settings-list button { background: #ff7675; color: white; border: none; border-radius: 6px; padding: 6px 10px; cursor: pointer; font-weight: bold; transition: 0.2s; font-size: 0.85rem; }
        
        .edit-inline-row { display: flex; gap: 8px; width: 100%; align-items: center; flex-wrap: wrap; }
        .edit-inline-row input { padding: 8px; }

        .btn-status { background: #00b894 !important; }
        .btn-edit { background: #74b9ff !important; }
        
        .finish-hint { color: var(--success); font-weight: bold; font-size: 0.85rem; margin-left: 10px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }

        .goal-item { display: flex; align-items: center; gap: 10px; padding: 10px; background: #fff; border-radius: 10px; margin-bottom: 8px; border: 1px solid #dfe6e9; border-left: 5px solid #00b894; }
        .goal-item.done span { text-decoration: line-through; color: #b2bec3; }
        .goal-item span { font-weight: bold; font-size: 1.05rem; flex-grow: 1; }

        input.proj-val-input::placeholder { color: #a29bfe; font-weight: normal; font-size: 0.85rem; }
    </style>
</head>
<body>

<nav class="tab-nav">
    <div class="ep-nav-item">
        <span style="font-size:0.85rem; font-weight:bold; color:#636e72;">總EP</span>
        <span id="epScore" class="ep-nav-score">0</span>
    </div>
    <div class="tab-btn active" onclick="switchTab('view-main', this)">🏠 每日主控台</div>
    <div class="tab-btn" onclick="switchTab('view-calendar', this)">🗺️ 實驗導航圖</div>
    <div class="tab-btn" onclick="switchTab('view-settings', this)">⚙️ 系統設定</div>
</nav>

<div class="main-wrapper">
    <div id="view-main" class="container">
        <div class="header-panel">
            <div class="quote-box"><span id="quoteText" class="fade-text">載入雙語座右銘...</span></div>
        </div>

        <div class="date-navigator">
            <button class="tab-btn" style="padding:8px 15px;" onclick="navigateDate(-1)">◀ 前一天</button>
            <div style="text-align:center;">
                <h2 class="current-date-title" id="display-date">115年7月1日</h2>
                <button class="tab-btn" style="font-size:0.8rem; padding:5px 12px; margin-top:5px; background:#ffeaa7; color:#d35400;" onclick="copyYesterday()">📋 複製昨日計畫</button>
            </div>
            <button class="tab-btn" style="padding:8px 15px;" onclick="navigateDate(1)">後一天 ▶</button>
        </div>

        <div class="time-config">
            <div class="time-capsule" style="background:var(--morning-bg); color:var(--morning-text);">
                <span>🌅 上午</span>
                <div class="time-inputs-row"><input type="number" id="t_m_h" min="0" oninput="saveAndCalculate()">:<input type="number" id="t_m_m" min="0" oninput="saveAndCalculate()"></div>
            </div>
            <div class="time-capsule" style="background:var(--afternoon-bg); color:white;">
                <span>☀️ 下午</span>
                <div class="time-inputs-row"><input type="number" id="t_a_h" min="0" oninput="saveAndCalculate()">:<input type="number" id="t_a_m" min="0" oninput="saveAndCalculate()"></div>
            </div>
            <div class="time-capsule" style="background:var(--evening-bg); color:white;">
                <span>🌙 晚上</span>
                <div class="time-inputs-row"><input type="number" id="t_e_h" min="0" oninput="saveAndCalculate()">:<input type="number" id="t_e_m" min="0" oninput="saveAndCalculate()"></div>
            </div>
        </div>

        <div class="monitor-panel">
            <div class="total-time-text" id="totalTimeText">等待輸入時間資源...</div>
            <div class="bar-container">
                <div class="bar-tasks" id="taskBar"></div>
                <div class="bar-free" id="freeBar"></div>
            </div>
        </div>
        
        <button class="tab-btn" style="width:100%; margin-bottom:20px; background:var(--success); color:white;" onclick="addNewTask()">➕ 增加新實驗任務</button>

        <div id="missionContainer">
            <div class="period-section section-1"><div class="section-title-period" style="color:var(--morning-text);"><div>🌅 上午實驗區</div><span id="rem-1" class="period-rem"></span></div><div id="list-1" class="grid-list"></div></div>
            <div class="period-section section-2"><div class="section-title-period" style="color:var(--afternoon-text);"><div>☀️ 下午實驗區</div><span id="rem-2" class="period-rem"></span></div><div id="list-2" class="grid-list"></div></div>
            <div class="period-section section-3"><div class="section-title-period" style="color:var(--evening-text);"><div>🌙 晚上實驗區</div><span id="rem-3" class="period-rem"></span></div><div id="list-3" class="grid-list"></div></div>
        </div>
        
        <div class="section-title" style="margin-top: 30px; color:#d35400; font-weight:bold; font-size:1.2rem;">🎁 能量兌換站</div>
        <div id="exchangeContainer" class="grid-list"></div>
        <button class="tab-btn" style="background:#e17055; color:white; font-size:0.9rem;" onclick="addNewExchange()">➕ 增加兌換項目</button>

        <div style="margin-top: 30px; margin-bottom: 20px;">
            <textarea id="daily-note-input" placeholder="今天有什麼特別的發現嗎？ (例如：今天去水族館超開心)" style="width: 100%; box-sizing: border-box; min-height: 60px; border: 2px dashed #ffeaa7; border-radius: 12px; padding: 10px; resize: vertical;" oninput="saveDOMToDay()"></textarea>
        </div>
    </div>

    <div id="view-calendar" class="container" style="display: none;">
        <div style="background:#f0fff4; padding:20px; border-radius:20px; border:2px dashed var(--success); margin-bottom:25px;">
            <h2 style="color:#00b894; margin-top:0; border-bottom:2px dashed #55efc4; padding-bottom:8px;">🌟 我的北極星目標</h2>
            <div class="settings-input-group">
                <input type="text" id="new-goal-input" style="flex:1" placeholder="輸入你想在暑假達成的大目標 (如：學會自由式)...">
                <button class="tab-btn" style="background:#00b894; color:white; padding:8px 15px;" onclick="addGoal()">新增目標</button>
            </div>
            <div id="goals-list"></div>
        </div>

        <h2 style="text-align:center; color:var(--primary); margin-bottom:10px;">🗺️ 實驗行事曆</h2>
        <div style="display:flex; justify-content:center; gap:20px; font-size:0.95rem; font-weight:bold; color:#636e72; margin-bottom: 20px; flex-wrap:wrap; background:#fff; padding:10px; border-radius:10px; border:1px solid #eee;">
            <span style="display:flex; align-items:center; gap:6px;"><div style="width:16px; height:16px; border-radius:4px; background:#fff; border:2px solid #f1f2f6;"></div> 未排程</span>
            <span style="display:flex; align-items:center; gap:6px;"><div style="width:16px; height:16px; border-radius:4px; background:#e9f5ff; border:2px solid #74b9ff;"></div> 藍：已排程</span>
            <span style="display:flex; align-items:center; gap:6px;"><div style="width:16px; height:16px; border-radius:4px; background:#e8f8f5; border:2px solid #00cec9;"></div> 綠：任務完成/出遊紀錄！</span>
        </div>
        
        <div id="calendar-render-area"></div>

        <h2 style="color:#0984e3; margin-top:35px; border-bottom:2px solid #eee; padding-bottom:5px; font-size:1.3rem;">📈 進行中專案看板</h2>
        <div id="project-dashboard" class="project-grid"></div>
        
        <h2 style="color:#f39c12; margin-top:35px; border-bottom:2px solid #eee; padding-bottom:5px; font-size:1.3rem;">🏆 榮譽殿堂</h2>
        <div id="fame-dashboard" class="project-grid"></div>
    </div>

    <div id="view-settings" class="container" style="display: none;">
        <div style="display: flex; justify-content: flex-end; gap: 8px; margin-bottom: 20px;">
            <button class="tab-btn" style="background:#2d3436; color:#dfe6e9; border:1px solid #636e72; padding:6px 12px; font-size:0.85rem;" onclick="exportData()">💾 匯出</button>
            <label class="tab-btn" style="background:#2d3436; color:#dfe6e9; border:1px solid #636e72; padding:6px 12px; font-size:0.85rem; cursor:pointer; margin:0;">
                📂 還原<input type="file" id="import-file" style="display:none;" accept=".json" onclick="if(!confirm('⚠️ 即將開啟檔案選擇器。載入備份將覆蓋現有資料，確定要繼續嗎？')) return false;" onchange="importData(event)">
            </label>
        </div>

        <h2 style="color:#0984e3; border-bottom:2px solid #eee; padding-bottom:10px;">📅 全域期程總管</h2>
        <div class="settings-date-range">
            全局假期開始：<input type="date" id="proj-start-date"> 
            結束：<input type="date" id="proj-end-date"> 
            <button class="tab-btn" style="background:#0984e3; color:white; padding:6px 15px;" onclick="updateProjectRange()">更新全局</button>
        </div>
        
        <div style="text-align: center; margin: 30px 0 20px 0;">
            <h2 style="display: inline-block; color: #2d3436; border-bottom: 3px solid #0984e3; padding-bottom: 5px; margin: 0; letter-spacing: 2px;">🎯 專案總管</h2>
        </div>
        <div class="domain-setting-block" style="border: 2px dashed #0984e3; background: #f4fbff;">
            <div class="settings-input-group">
                <input type="text" id="new-proj-name" class="opt-name" placeholder="專案名稱 (例:閱讀哈利波特)">
                <select id="new-proj-domain" class="settings-type-select" style="flex:1;">
                    <option value="語文/閱讀">語文/閱讀</option><option value="數學/邏輯">數學/邏輯</option><option value="社會/人文">社會/人文</option>
                    <option value="自然/科技">自然/科技</option><option value="藝術">藝術</option><option value="健康/體育">健康/體育</option><option value="綜合">綜合</option>
                </select>
                <select id="new-proj-type" class="settings-type-select" style="flex:1;">
                    <option value="指定">指定</option><option value="自主" selected>自主</option>
                </select>
            </div>
            <div class="settings-input-group" style="background:#fff; padding:10px; border-radius:8px; border:1px solid #eee;">
                起算日期：<input type="date" id="new-proj-start" onchange="previewProjectCalc()">
                執行天數：<input type="number" id="new-proj-days" style="width:65px; text-align:center;" min="1" oninput="previewProjectCalc()">
                總目標量：<input type="number" id="new-proj-goal" style="width:75px; text-align:center;" min="1" oninput="previewProjectCalc()">
                單位：<input type="text" id="new-proj-unit" style="width:55px; text-align:center;" placeholder="頁">
                單次EP：<input type="number" id="new-proj-ep" style="width:50px; text-align:center;" value="5" min="1">
                
                <button id="btn-submit-proj" class="tab-btn" style="background:#0984e3; color:white; padding:6px 15px; margin-left:auto;" onclick="submitProjectForm()">➕ 新增</button>
                <button id="btn-cancel-proj" class="tab-btn" style="background:#b2bec3; color:white; padding:6px 15px; display:none;" onclick="clearProjectForm()">❌ 取消</button>
            </div>
            
            <div id="proj-calc-preview" style="font-size:0.95rem; color:var(--success); font-weight:bold; margin-bottom:15px; text-align:center; background:#e8f8f5; padding:8px; border-radius:8px;">
                請輸入數據進行即時試算...
            </div>

            <ul class="settings-list" id="project-list"></ul>
        </div>
        
        <div style="text-align: center; margin: 30px 0 20px 0;">
            <h2 style="display: inline-block; color: #2d3436; border-bottom: 3px solid #00cec9; padding-bottom: 5px; margin: 0; letter-spacing: 2px;">📝 領域內容設定</h2>
        </div>
        <div id="settings-container"></div>
    </div>
</div>

<script>
    function getLocalISODate(d) {
        return new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Taipei', year: 'numeric', month: '2-digit', day: '2-digit' }).format(d);
    }

    function generateUUID() {
        return crypto.randomUUID ? crypto.randomUUID() : 'opt-' + Math.random().toString(36).substr(2, 9);
    }

    function escapeHTML(str) {
        if (str === null || str === undefined) return '';
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    let appData = JSON.parse(localStorage.getItem('holidayLabData_v16.6')) || {
        ep: 0, startDate: "2026-07-01", endDate: "2026-08-30",
        goals: [], projects: [], 
        domainOptions: {
            "語文/閱讀": [{type:"指定", name:"閱讀第1章", memo:"", hidden:false, ep: 5}],
            "數學/邏輯": [{type:"指定", name:"完成數學習作", memo:"", hidden:false, ep: 5}],
            "社會/人文": [{type:"自主", name:"查閱歷史地圖", memo:"", hidden:false, ep: 5}],
            "自然/科技": [{type:"指定", name:"自然觀察日記", memo:"", hidden:false, ep: 5}],
            "藝術": [{type:"自主", name:"繪畫創作", memo:"", hidden:false, ep: 5}],
            "健康/體育": [{type:"指定", name:"跳繩", memo:"", hidden:false, ep: 5}],
            "綜合": [{type:"指定", name:"整理房間", memo:"", hidden:false, ep: 5}]
        },
        days: {} 
    };

    function sortDomainOptions(domain) {
        const typeWeight = { "指定": 1, "自主": 2, "其他": 3 };
        appData.domainOptions[domain].sort((a, b) => {
            let wA = typeWeight[a.type] || 99;
            let wB = typeWeight[b.type] || 99;
            if (wA !== wB) return wA - wB;
            
            let pA = (a.memo === "★專案") ? 1 : 2;
            let pB = (b.memo === "★專案") ? 1 : 2;
            if (pA !== pB) return pA - pB;
            
            return 0;
        });
    }

    if(!appData.projects) appData.projects = [];
    if(!appData.goals) appData.goals = [];
    appData.projects.forEach(p => { 
        if(!p.status) p.status = 'active'; 
        if(p.deadline && !p.duration) {
            let diff = new Date(p.deadline) - new Date(p.startDate);
            p.duration = Math.max(1, Math.floor(diff / 86400000) + 1);
        }
        if(p.ep === undefined) p.ep = 5;

        if(!p.id) {
            p.id = generateUUID();
            let opt = appData.domainOptions[p.domain]?.find(o => o.name === p.name && o.memo === "★專案");
            if (opt) opt.id = p.id;
            
            Object.keys(appData.days).forEach(date => {
                if (date >= p.startDate && appData.days[date].tasks) {
                    appData.days[date].tasks.forEach(t => {
                        if (t.progress === p.name && !t.projId) t.projId = p.id;
                    });
                }
            });
        }
    });
    Object.keys(appData.domainOptions).forEach(dom => {
        appData.domainOptions[dom] = appData.domainOptions[dom].map(opt => {
            if (typeof opt === 'string') return {id: generateUUID(), type: "指定", name: opt, memo: "", hidden:false, ep: 5};
            if (!opt.id) opt.id = generateUUID();
            if (!opt.type) opt.type = "指定"; 
            if (opt.memo === "★長期專案" || opt.memo === "★長期專案") opt.memo = "★專案";
            if (opt.hidden === undefined) opt.hidden = false;
            if (opt.ep === undefined) opt.ep = 5;
            return opt;
        });
        sortDomainOptions(dom);
    });
    Object.keys(appData.days).forEach(date => {
        if(appData.days[date].tasks) {
            appData.days[date].tasks.forEach(t => {
                if(t.ep === undefined) t.ep = 5;
            });
        }
    });

    let currentDateStr = appData.startDate; 
    let editingProjectIdx = -1;
    let editingDomain = null;     
    let editingOptId = null;       
    
    const domains = ["語文/閱讀", "數學/邏輯", "社會/人文", "自然/科技", "藝術", "健康/體育", "綜合"];
    const predefinedTasks = ["領域", ...domains, "其他"];
    
    const quotes = [
        "Focus is your superpower!\n專注驚人的超能力！", "Mistakes are just data.\n錯誤只是實驗數據。", 
        "You are evolving every day!\n你每天都在進化中！", "Keep exploring, Scientist!\n繼續探索吧，科學家！", 
        "Every effort counts!\n每一份努力都算數！", "Level up your brain!\n讓你的大腦升級吧！",
        "Small steps, big results.\n小小步伐，大大成就。", "Curiosity fuels discovery.\n好奇心驅動新發現。",
        "Challenges make you stronger.\n挑戰使你更強大。", "Today is a blank canvas.\n今天是一張全新的畫布。",
        "Done is better than perfect.\n完成比完美更重要。", "Your attitude determines your direction.\n你的態度決定你的方向。",
        "Be the hero of your own story.\n做自己故事裡的英雄。", "Stay curious, stay wild!\n保持好奇，保持熱血！"
    ];

    window.onload = function() { 
        document.getElementById('proj-start-date').value = appData.startDate;
        document.getElementById('proj-end-date').value = appData.endDate;
        renderAll();
        loadDayToDOM(currentDateStr);
    };

    function saveData() { 
        try {
            localStorage.setItem('holidayLabData_v16.6', JSON.stringify(appData)); 
            updateEP(); 
        } catch (e) {
            alert("⚠️ 儲存失敗：瀏覽器儲存空間已滿或處於無痕模式，系統無法存入進度資料！");
            console.error("LocalStorage Save Error:", e);
        }
    }

    function syncAndRenderDomains() {
        domains.forEach(d => sortDomainOptions(d));
        saveData();
        renderSettings();
    }
    
    function exportData() {
        const dataStr = JSON.stringify(appData, null, 2);
        const blob = new Blob([dataStr], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        let d = new Date();
        a.download = `HolidayLab_Backup_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}.json`;
        a.click();
        URL.revokeObjectURL(url);
        alert("✅ 備份檔案已成功匯出！請妥善保存。");
    }

    function importData(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const imported = JSON.parse(e.target.result);
                if(imported.projects && imported.domainOptions) {
                    appData = imported;
                    saveData();
                    alert("✅ 資料還原成功！系統將重新載入。");
                    location.reload();
                } else {
                    alert("❌ 檔案格式不正確，還原失敗。");
                }
            } catch (err) {
                alert("❌ 檔案解析失敗，請確認檔案格式是否正確。");
            }
            event.target.value = '';
        };
        reader.readAsText(file);
    }

    function renderAll() { renderSettings(); renderGoals(); renderCalendar(); updateDailyQuote(currentDateStr); updateEP(); }
    function updateEP() { document.getElementById('epScore').innerText = appData.ep; }

    function switchTab(viewId, btnElement) {
        document.getElementById('view-main').style.display = 'none';
        document.getElementById('view-calendar').style.display = 'none';
        document.getElementById('view-settings').style.display = 'none';
        document.getElementById(viewId).style.display = 'block';
        document.querySelectorAll('.tab-nav .tab-btn').forEach(btn => btn.classList.remove('active'));
        btnElement.classList.add('active');
        if(viewId === 'view-calendar') renderCalendar();
    }

    function updateProjectRange() {
        const s = document.getElementById('proj-start-date').value; const e = document.getElementById('proj-end-date').value;
        if(s && e && s <= e) { appData.startDate = s; appData.endDate = e; saveData(); alert("全局期程更新成功！"); renderCalendar(); } 
        else { alert("日期區間設定錯誤！"); }
    }

    function getFormattedDate(dateStr) {
        const d = new Date(dateStr); const days = ["日", "一", "二", "三", "四", "五", "六"];
        return `${d.getFullYear()-1911}年${d.getMonth()+1}月${d.getDate()}日 (週${days[d.getDay()]})`;
    }
    
    function updateDailyQuote(dateStr) {
        const epochDays = Math.floor(new Date(dateStr).getTime() / 86400000);
        const qIdx = Math.abs(epochDays) % quotes.length;
        document.getElementById('quoteText').innerText = quotes[qIdx];
    }

    function navigateDate(offset) {
        saveDOMToDay(); 
        let d = new Date(currentDateStr); d.setDate(d.getDate() + offset);
        currentDateStr = getLocalISODate(d);
        loadDayToDOM(currentDateStr);
    }

    function jumpToDate(dateStr) { 
        saveDOMToDay(); currentDateStr = dateStr; 
        loadDayToDOM(currentDateStr); 
        switchTab('view-main', document.querySelector('.tab-nav .tab-btn:nth-child(2)')); 
    }

    function getTaskEP(domain, type, progressName) {
        if (!appData.domainOptions[domain]) return 5;
        let opt = appData.domainOptions[domain].find(o => o.name === progressName);
        if (opt && opt.ep !== undefined) return parseInt(opt.ep);
        return 5; 
    }

    function renderGoals() {
        const list = document.getElementById('goals-list'); list.innerHTML = '';
        appData.goals.forEach((g, idx) => {
            let clz = g.done ? 'done' : ''; let chk = g.done ? 'checked' : '';
            list.innerHTML += `
                <div class="goal-item ${clz}">
                    <input type="checkbox" class="check-box" onchange="toggleGoal(${idx})" ${chk} style="pointer-events:auto;">
                    <span>${escapeHTML(g.text)}</span>
                    <button onclick="removeGoal(${idx})" class="btn-del">×</button>
                </div>`;
        });
    }
    function addGoal() {
        let text = document.getElementById('new-goal-input').value.trim();
        if(text) { appData.goals.push({text: text, done: false}); saveData(); renderGoals(); document.getElementById('new-goal-input').value = ''; }
    }
    function removeGoal(idx) { appData.goals.splice(idx, 1); saveData(); renderGoals(); }
    function toggleGoal(idx) { appData.goals[idx].done = !appData.goals[idx].done; saveData(); renderGoals(); }

    function renderCalendar() {
        renderDashboard(); 
        const area = document.getElementById('calendar-render-area'); area.innerHTML = '';
        let dStart = new Date(appData.startDate); let dEnd = new Date(appData.endDate);
        let startMonth = new Date(dStart.getFullYear(), dStart.getMonth(), 1); let endMonth = new Date(dEnd.getFullYear(), dEnd.getMonth(), 1);
        
        let currentMonth = new Date(startMonth);
        while(currentMonth <= endMonth) {
            let y = currentMonth.getFullYear(); let m = currentMonth.getMonth();
            let html = `<div class="calendar-month-block"><h2 class="calendar-month-title">${y-1911}年 ${m+1}月</h2><div class="calendar-grid">`;
            ["日","一","二","三","四","五","六"].forEach(dw => html += `<div class="cal-header">${dw}</div>`);
            
            let firstDay = new Date(y, m, 1).getDay(); let daysInMonth = new Date(y, m+1, 0).getDate();
            for(let i=0; i<firstDay; i++) html += `<div class="cal-day empty"></div>`;
            
            for(let i=1; i<=daysInMonth; i++) {
                let checkDate = `${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                if(checkDate < appData.startDate || checkDate > appData.endDate) { html += `<div class="cal-day empty"></div>`; } 
                else {
                    let statusClass = "status-none"; let dayData = appData.days[checkDate];
                    
                    if (dayData) {
                        let hasTasks = dayData.tasks && dayData.tasks.length > 0;
                        let hasNote = dayData.dailyNote && dayData.dailyNote.trim() !== "";
                        
                        if (hasTasks) {
                            statusClass = dayData.tasks.every(t => t.completed) ? "status-done" : "status-planned";
                        } else if (hasNote) {
                            statusClass = "status-done";
                        }
                    }

                    let activeClass = (checkDate === currentDateStr) ? "active" : "";
                    html += `<div class="cal-day ${statusClass} ${activeClass}" onclick="jumpToDate('${checkDate}')">${i}</div>`;
                }
            }
            html += `</div></div>`; area.innerHTML += html; currentMonth.setMonth(currentMonth.getMonth() + 1);
        }
    }

    function getProjectLiveStats(proj) {
        let accTotal = 0; let accBeforeToday = 0;
        Object.entries(appData.days).forEach(([dStr, day]) => {
            if(dStr >= appData.startDate && dStr <= appData.endDate && day.tasks) {
                day.tasks.forEach(t => {
                    if(t.projId === proj.id && t.projValue && t.completed === true) {
                        let val = parseInt(t.projValue) || 0;
                        accTotal += val;
                        if(dStr < currentDateStr) accBeforeToday += val;
                    }
                });
            }
        });
        let pEnd = new Date(proj.deadline); let now = new Date(currentDateStr);
        let remainingDays = Math.ceil((pEnd - now) / 86400000) + 1;
        if(now > pEnd) remainingDays = 1;
        
        let remainingGoal = Math.max(0, proj.totalGoal - accBeforeToday);
        let avg = (remainingDays > 0) ? (remainingGoal / remainingDays).toFixed(1) : 0;
        return { accTotal, remainingDays: remainingDays > 0 ? remainingDays : 0, dailySuggest: avg.endsWith('.0') ? avg.slice(0, -2) : avg };
    }

    function renderDashboard() {
        const activeArea = document.getElementById('project-dashboard'); activeArea.innerHTML = '';
        const fameArea = document.getElementById('fame-dashboard'); fameArea.innerHTML = '';
        
        appData.projects.forEach(proj => {
            const stats = getProjectLiveStats(proj);
            let taskPct = Math.min(100, (stats.accTotal / proj.totalGoal) * 100);
            
            if(proj.status === 'active') {
                let dFocus = new Date(currentDateStr);
                let focusDateLabel = `${dFocus.getFullYear()-1911}年${dFocus.getMonth()+1}月${dFocus.getDate()}日`;

                activeArea.innerHTML += `
                <div class="project-card ${stats.accTotal >= proj.totalGoal ? 'achieved' : ''}">
                    <div style="display:flex; justify-content:space-between; font-weight:bold; margin-bottom:8px;">
                        <span style="font-size:1.1rem; color:var(--primary);">${escapeHTML(proj.name)}</span>
                        <span style="color:#0984e3; font-size:1.1rem;">${stats.accTotal} / ${proj.totalGoal} ${escapeHTML(proj.unit)}</span>
                    </div>
                    <div style="font-size:0.8rem; color:#636e72; background:#f8fafc; padding:6px 10px; border-radius:8px; margin-bottom:12px; font-weight:bold; border:1px solid #eee;">
                        📅 期程：${proj.startDate} ~ ${proj.deadline} (${proj.duration}天) | 🎯 總計: ${proj.totalGoal}${escapeHTML(proj.unit)} | 📈 預定每日: ${(proj.totalGoal/proj.duration).toFixed(1).replace('.0','')} ${escapeHTML(proj.unit)}
                    </div>
                    <div style="position:relative; height:12px; background:#dfe6e9; border-radius:6px; overflow:hidden; margin-bottom:12px;">
                        <div style="position:absolute; top:0; left:0; height:100%; width:${taskPct}%; background:linear-gradient(90deg, #55efc4, #00b894); border-radius:6px;"></div>
                    </div>
                    
                    <div style="display:flex; justify-content:space-between; font-size:0.85rem; font-weight:bold; align-items:center; flex-wrap:wrap; gap:8px;">
                        <span style="display:flex; align-items:center;">
                            <span style="background:#e9f5ff; color:#0984e3; padding:3px 6px; border-radius:6px; margin-right:6px; font-size:0.8rem;">📍 ${focusDateLabel} 視角</span>
                            <span>⏳ 距離到期日：${stats.remainingDays} 天</span>
                        </span>
                        <span style="color:#d35400;">🎯 建議今日推進：${stats.dailySuggest} ${escapeHTML(proj.unit)}</span>
                    </div>
                </div>`;
            } else {
                fameArea.innerHTML += `
                <div class="fame-card">
                    <div><h3 class="fame-title">👑 ${escapeHTML(proj.name)}</h3><p style="margin:4px 0 0 0; color:#636e72; font-size:0.85rem; font-weight:bold;">順利挑戰完畢 ${proj.totalGoal} ${escapeHTML(proj.unit)}！</p></div>
                    <div style="font-size:1.8rem;">🏅</div>
                </div>`;
            }
        });
    }

    function loadDayToDOM(dateStr) {
        document.getElementById('display-date').innerText = getFormattedDate(dateStr);
        updateDailyQuote(dateStr);

        let dayData = appData.days[dateStr] || { times: [0,0, 0,0, 0,0], tasks: [], exchanges: [], dailyNote: "" };
        
        document.getElementById('daily-note-input').value = dayData.dailyNote || '';

        ['t_m_h','t_m_m','t_a_h','t_a_m','t_e_h','t_e_m'].forEach((id, i) => document.getElementById(id).value = dayData.times[i] || '');
        
        document.getElementById('list-1').innerHTML = ''; document.getElementById('list-2').innerHTML = ''; document.getElementById('list-3').innerHTML = '';
        document.getElementById('exchangeContainer').innerHTML = '';
        
        if(dayData.tasks) dayData.tasks.forEach(t => renderTaskToDOM(t)); 
        if(dayData.exchanges) dayData.exchanges.forEach(e => renderExchangeToDOM(e));
        calculateTime();
    }

    function saveAndCalculate() { 
        refreshAllProjectBindings();
        saveDOMToDay(); 
        calculateTime(); 
    }

    function saveDOMToDay() {
        let times = ['t_m_h','t_m_m','t_a_h','t_a_m','t_e_h','t_e_m'].map(id => parseInt(document.getElementById(id).value)||0);
        let dailyNote = document.getElementById('daily-note-input').value.trim();
        let tasks = [];
        document.querySelectorAll('#missionContainer .list-item').forEach(el => {
            let typeSel = el.querySelector('.type-select') ? el.querySelector('.type-select').value : '指定';
            let nameSel = el.querySelector('.name-select') ? el.querySelector('.name-select').value : '領域';
            
            let progSel = el.querySelector('.progress-select');
            let progTxt = el.querySelector('.progress-input-text');
            let progInp = '';
            if (progTxt && progTxt.style.display !== 'none') {
                progInp = progTxt.value.trim();
            } else if (progSel && progSel.value !== '自訂...' && progSel.value !== '') {
                progInp = progSel.value;
            }

            let stageInp = el.querySelector('.task-stage-input');
            let valInp = el.querySelector('.proj-val-input'); 
            let timeInp = el.querySelector('.task-time-input');
            let periodSel = el.querySelector('.period-select');
            
            let lockedEpAttr = el.getAttribute('data-locked-ep');
            let projIdAttr = el.getAttribute('data-proj-id');
            let savedEp;
            if (el.classList.contains('completed')) {
                savedEp = lockedEpAttr ? parseInt(lockedEpAttr) : 5;
            } else {
                savedEp = undefined; 
            }

            tasks.push({
                checked: el.querySelector('.check-box').checked, completed: el.classList.contains('completed'), 
                type: typeSel, name: nameSel, progress: progInp, 
                stageMemo: stageInp ? stageInp.value : '', 
                projValue: valInp ? (parseInt(valInp.value) || 0) : 0, 
                time: timeInp ? (parseInt(timeInp.value) || 0) : 0,
                period: periodSel ? periodSel.value : '1',
                ep: savedEp,
                projId: projIdAttr || undefined
            });
        });
        let exchanges = [];
        document.querySelectorAll('#exchangeContainer .list-item').forEach(el => {
            exchanges.push({ 
                checked: el.querySelector('.ex-check-box').checked, completed: el.classList.contains('completed'), 
                name: el.querySelector('.ex-name').value, cost: parseInt(el.querySelector('.ex-cost').value) || 0 
            });
        });
        appData.days[currentDateStr] = { times, tasks, exchanges, dailyNote }; saveData();
    }

    function copyYesterday() {
        let hasTimeInput = ['t_m_h','t_m_m','t_a_h','t_a_m','t_e_h','t_e_m'].some(id => (parseInt(document.getElementById(id).value) || 0) > 0);
        let hasTasks = document.querySelectorAll('#missionContainer .list-item').length > 0;
        
        if (hasTimeInput || hasTasks) {

        const valInput = p.querySelector('.proj-val-input');
        const stageInput = p.querySelector('.task-stage-input');

        }
        
        let activeInput = (progTxt.style.display !== 'none') ? progTxt : progSel;
        let hiddenInput = (progTxt.style.display !== 'none') ? progSel : progTxt;
        
        let projId = p.getAttribute('data-proj-id');

        let isChecked = t.checked ? 'checked' : '';

        let optionsHtml = '<option value="">請選擇...</option>';
        let foundMatch = false;
        
        if (t.name === '領域') {
            domains.forEach(d => {
                appData.domainOptions[d].filter(o => o.type === (t.type || '指定') && !o.hidden).forEach(opt => {

    function handleTaskCheck(chk) { 
        const p = chk.parentElement; 
        let typeSel = p.querySelector('.type-select').value;
        let nameSel = p.querySelector('.name-select').value;
        
        let progSel = p.querySelector('.progress-select');
        let progTxt = p.querySelector('.progress-input-text');
        let progInp = '';
        if (progTxt && progTxt.style.display !== 'none') {
            progInp = progTxt.value.trim();
        } else if (progSel && progSel.value !== '自訂...') {
            progInp = progSel.value;
        }

        let projIdAttr = p.getAttribute('data-proj-id');
        let linkedProj = appData.projects.find(pr => pr.id === projIdAttr || pr.name === progInp);

        if (linkedProj && linkedProj.status === 'completed') {
            alert("已結案，若要修改請至「系統設定」中取消結案。");
            chk.checked = !chk.checked; 
            return;
        }

        if(chk.checked) { 
            let freshEp = getTaskEP(nameSel, typeSel, progInp);
            p.setAttribute('data-locked-ep', freshEp);
            p.classList.add('completed'); 
            appData.ep += freshEp; 
            saveAndCalculate(); 
        } else { 
            let lockedEp = parseInt(p.getAttribute('data-locked-ep')) || 5;
            if (appData.ep - lockedEp < 0) {
                alert("能量點數餘額不足！請先取消兌換項目，或持續累積點數。");
                chk.checked = true;
                return;
            }
            p.classList.remove('completed'); 
            appData.ep -= lockedEp; 
            p.removeAttribute('data-locked-ep');
            saveAndCalculate(); 
        } 
    }

    function handleExchangeCheck(chk) { 
        const p = chk.parentElement; let cost = parseInt(p.querySelector('.ex-cost').value) || 0; 
        if(chk.checked) { 
            if(cost > appData.ep) { alert("能量點數不足喔！繼續實驗累積吧！"); chk.checked = false; return; } 
            appData.ep -= cost; p.classList.add('completed'); 
        } else { appData.ep += cost; p.classList.remove('completed'); } 
        saveDOMToDay();
    }

    function calculateTime() {
        const hInps = [document.getElementById('t_m_h'), document.getElementById('t_a_h'), document.getElementById('t_e_h')];
        const mInps = [document.getElementById('t_m_m'), document.getElementById('t_a_m'), document.getElementById('t_e_m')];
        let pTotal = hInps.map((h, i) => (Math.max(0, parseInt(h.value)) || 0) * 60 + (Math.max(0, parseInt(mInps[i].value)) || 0));
        let totalMin = pTotal.reduce((a, b) => a + b, 0); let pUsed = [0, 0, 0], usedMin = 0;
        
        document.querySelectorAll('#missionContainer .list-item').forEach(el => {
            let timeInp = el.querySelector('.task-time-input');
            if(timeInp) {
                let time = Math.max(0, parseInt(timeInp.value)) || 0; usedMin += time;
                let pid = el.querySelector('.period-select') ? el.querySelector('.period-select').value : el.closest('.grid-list').id.split('-')[1];
                pUsed[pid-1] += time;
            }
        });
        
        document.getElementById('totalTimeText').innerText = totalMin > 0 ? `總時間資源：${Math.floor(totalMin/60)}小時 ${totalMin%60}分` : "請輸入上方膠囊時間...";
        let usedPct = totalMin > 0 ? Math.min(100, (usedMin / totalMin) * 100) : 0;
        document.getElementById('taskBar').style.width = `${usedPct}%`; document.getElementById('freeBar').style.width = `${100 - usedPct}%`;
        document.getElementById('taskBar').innerText = usedMin > 0 ? `已排程: ${usedMin}分` : '';
        document.getElementById('freeBar').innerText = (totalMin - usedMin) > 0 ? `放空: ${totalMin - usedMin}分` : '';
        if((totalMin - usedMin) < 0) {
            document.getElementById('taskBar').innerText = `超時 ${Math.abs(totalMin - usedMin)} 分`;
            document.getElementById('taskBar').style.background = "linear-gradient(135deg, #ff7675, #d63031)";
            document.getElementById('freeBar').innerText = "";
        } else { document.getElementById('taskBar').style.background = "linear-gradient(135deg, #74b9ff, #0984e3)"; }

        for(let i=1; i<=3; i++) {
            let rem = pTotal[i-1] - pUsed[i-1], el = document.getElementById(`rem-${i}`);
            if(pTotal[i-1] === 0 && pUsed[i-1] === 0) { el.innerText = "未排程"; el.style.background = "#dfe6e9"; el.style.color = "#636e72"; }
            else if (rem < 0) { el.innerText = `⚠️ 超時 ${Math.abs(rem)} 分`; el.style.background = "#ff7675"; el.style.color = "#fff"; }
            else { el.innerText = `放空 ${rem} 分`; el.style.background = "#55efc4"; el.style.color = "#2d3436"; }
        }
    }

    function previewProjectCalc() {

        } else { pvw.innerText = `請輸入正確的目標數量與執行天數以計算每日平均`; }

    function submitProjectForm() {
        let name = document.getElementById('new-proj-name').value.trim();
        let domain = document.getElementById('new-proj-domain').value;
        let type = document.getElementById('new-proj-type').value;
        let goal = parseInt(document.getElementById('new-proj-goal').value);
        let unit = document.getElementById('new-proj-unit').value.trim() || '頁';
        let startDate = document.getElementById('new-proj-start').value;
        let days = parseInt(document.getElementById('new-proj-days').value);
        let ep = parseInt(document.getElementById('new-proj-ep').value) || 5;

        if(!name || isNaN(goal) || !startDate || isNaN(days) || days <= 0 || goal <= 0) { alert("請完整填寫專案的所有欄位項目！"); return; }
        
        let endDate = new Date(startDate); endDate.setDate(endDate.getDate() + days - 1);
        let deadline = getLocalISODate(endDate);
        let projObj = { name, domain, type, totalGoal: goal, unit, startDate, deadline, duration: days, status: 'active', ep };

        if(editingProjectIdx === -1) {
            if(appData.projects.some(p => p.name === name)) { alert("這個專案名稱已經存在囉！"); return; }
            projObj.id = generateUUID();
            appData.projects.push(projObj);
            appData.domainOptions[domain].push({ id: projObj.id, type, name, memo: "★專案", hidden: false, ep });
        } else {
            if(appData.projects.some((p, i) => p.name === name && i !== editingProjectIdx)) { alert("這個專案名稱已經存在。"); return; }
            let oldP = appData.projects[editingProjectIdx];
            projObj.status = oldP.status;
            projObj.id = oldP.id;
            
            let oldOptIdx = appData.domainOptions[oldP.domain].findIndex(o => o.id === oldP.id || (o.name === oldP.name && o.memo === "★專案"));
            if(oldOptIdx > -1) appData.domainOptions[oldP.domain].splice(oldOptIdx, 1);
            appData.domainOptions[domain].push({ id: projObj.id, type, name, memo: "★專案", hidden: (oldP.status === 'completed'), ep });

            appData.projects[editingProjectIdx] = projObj;
        }
        syncAndRenderDomains();
        clearProjectForm(); loadDayToDOM(currentDateStr); renderCalendar();
    }

                                <input type="text" id="edit-name-${dom}-${opt.id}" value="${escapeHTML(opt.name)}" style="flex:2;">
                                <input type="text" id="edit-memo-${dom}-${opt.id}" value="${escapeHTML(opt.memo)}" placeholder="備註" style="flex:1.5;">
                                <span style="font-size:0.85rem; color:#636e72; font-weight:bold;">EP:</span>
                                <input type="number" id="edit-ep-${dom}-${opt.id}" value="${opt.ep || 5}" min="1" style="width:50px;">
                                <div style="display:flex; gap:5px; margin-left:auto;">
                                    <button class="btn-status" style="background:#00b894;" onclick="saveEditDomainOption('${dom}', '${opt.id}')">💾 儲存</button>
                                    <button class="btn-del" style="background:#b2bec3; width:auto; padding:6px 10px;" onclick="cancelEditDomainOption()">❌</button>
                                </div>
                            </div>
                        </li>`;
                } else {
                    let isProj = (opt.memo === "★專案");
                    let memoHtml = opt.memo ? `<span style="color:#b2bec3; font-size:0.85rem; margin-left:10px;">(${escapeHTML(opt.memo)})</span>` : '';
                    let epBadge = `<span style="background:#f1c40f; color:#fff; padding:2px 8px; border-radius:12px; font-size:0.8rem; margin-left:8px; font-weight:bold;">${opt.ep || 5} EP</span>`;
                    let typeSelect = `<select class="settings-type-select" ${isProj ? 'disabled' : ''} onchange="changeOptionType('${dom}', '${opt.id}', this.value)"><option value="指定" ${opt.type==='指定'?'selected':''}>指定</option><option value="自主" ${opt.type==='自主'?'selected':''}>自主</option><option value="其他" ${opt.type==='其他'?'selected':''}>其他</option></select>`;
                    let editBtn = isProj ? `<button class="btn-edit" style="background:#b2bec3; cursor:not-allowed;" onclick="alert('請至上方專案總管編輯')">🔒 鎖定</button>` : `<button class="btn-edit" onclick="startEditDomainOption('${dom}', '${opt.id}')">✏️ 編輯</button>`;
                    let delBtn = isProj ? `<button class="btn-del" style="background:#b2bec3; cursor:not-allowed;" onclick="alert('請至上方專案總管編輯')">🔒</button>` : `<button class="btn-del" onclick="removeDomainOption('${dom}', '${opt.id}')">×</button>`;
                    html += `<li>
                                <div style="${opt.hidden?'opacity:0.4; text-decoration:line-through;':''}">${typeSelect} <span>${escapeHTML(opt.name)}</span> ${epBadge} ${memoHtml}</div> 
                                <div>
                                    <button class="btn-status" style="background:#b2bec3" onclick="toggleTaskVisibility('${dom}', '${opt.id}')">${opt.hidden?'👁️ 顯示':'🙈 隱藏'}</button>
                                    ${editBtn}
                                    ${delBtn}
                                </div>
                            </li>`; 
                }
            });
            html += `</ul></div>`; container.innerHTML += html;
        });
    }

    function toggleTaskVisibility(domain, optId) {
        let opt = appData.domainOptions[domain].find(o => o.id === optId);
        if(opt) opt.hidden = !opt.hidden;
        syncAndRenderDomains();
    }

    function startEditDomainOption(domain, optId) {
        alert("提示：修改好的內容不會更改過去已經記錄好的任務，但會套用到未來的新排程！");
        editingDomain = domain;
        editingOptId = optId;
        renderSettings();
    }

    function cancelEditDomainOption() {
        editingDomain = null;
        editingOptId = null;
        renderSettings();
    }

    function saveEditDomainOption(domain, optId) {
        let newType = document.getElementById(`edit-type-${domain}-${optId}`).value;
        let newName = document.getElementById(`edit-name-${domain}-${optId}`).value.trim();
        let newMemo = document.getElementById(`edit-memo-${domain}-${optId}`).value.trim();
        let newEp = parseInt(document.getElementById(`edit-ep-${domain}-${optId}`).value) || 5;

        if (!newName) { alert("名稱不能為空白！"); return; }
        if (appData.domainOptions[domain].some(o => o.name === newName && o.id !== optId)) { alert("此內容描述已存在。"); return; }

        let currentOpt = appData.domainOptions[domain].find(o => o.id === optId);
        if(currentOpt) {
            currentOpt.type = newType;
            currentOpt.name = newName;
            currentOpt.memo = newMemo;
            currentOpt.ep = newEp;
        }

        editingDomain = null;
        editingOptId = null;
        syncAndRenderDomains();
    }

    function renderProjects() {
        const list = document.getElementById('project-list'); list.innerHTML = '';
        appData.projects.forEach((p, idx) => {
            const stats = getProjectLiveStats(p);
            let isTargetMet = stats.accTotal >= p.totalGoal;
            let hint = (isTargetMet && p.status === 'active') ? '<span style="background:#ff7675; color:white; padding:2px 8px; border-radius:12px; font-size:0.8rem; margin-left:8px; font-weight:bold; animation:pulse 1.5s infinite;">✨ 已完成，請結案</span>' : '';
            let statusBtnHtml = p.status === 'active' ? `<button class="btn-status" style="background:var(--success)" onclick="toggleProjectStatus(${idx})">🏆 結案</button>` : `<button class="btn-status" style="background:#f39c12" onclick="toggleProjectStatus(${idx})">🔄 重啟</button>`;
            
            list.innerHTML += `
                <li style="border-left-color:#0984e3; flex-direction:column; align-items:flex-start; margin-bottom:10px; padding:12px; background:#f8fafc; border-radius:10px;">
                    <div style="display:flex; justify-content:space-between; width:100%; align-items:center;">
                        <div style="${p.status==='completed'?'text-decoration:line-through; color:#b2bec3;':''}; font-weight:bold;"><span style="color:#0984e3;">[${p.type}] ${p.domain}</span> ${escapeHTML(p.name)} <span style="background:#f1c40f; color:#fff; padding:2px 8px; border-radius:12px; font-size:0.8rem; margin-left:8px;">${p.ep || 5} EP</span> ${hint}</div>
                        <div>
                            ${statusBtnHtml}
                            <button class="btn-edit" onclick="editProject(${idx})">✏️ 編輯</button>
                            <button class="btn-del" onclick="removeProject(${idx})">×</button>
                        </div>
                    </div>
                    <div style="color:#636e72; font-size:0.85rem; font-weight:bold; margin-top:4px;">
                        📅 期程：${p.startDate} ~ ${p.deadline} (${p.duration}天) | 🎯 總目標量: ${p.totalGoal} ${escapeHTML(p.unit)}
                    </div>
                </li>`;
        });
    }

    function changeOptionType(domain, optId, newType) { 
        let opt = appData.domainOptions[domain].find(o => o.id === optId);
        if(opt) opt.type = newType; 
        syncAndRenderDomains(); 
    }
    
    function addDomainOption(domain) { 
        const nameInput = document.getElementById('add-'+domain); 
        const memoInput = document.getElementById('memo-'+domain);
        const epInput = document.getElementById('ep-'+domain);
        
        const nameVal = nameInput.value.trim(); 
        const memoVal = memoInput.value.trim();
        const epVal = parseInt(epInput.value) || 5;

        if(nameVal) { 
            if(!appData.domainOptions[domain].some(o => o.name === nameVal)) { 
                appData.domainOptions[domain].push({id: generateUUID(), type: "指定", name: nameVal, memo: memoVal, hidden: false, ep: epVal}); 
                nameInput.value=''; memoInput.value=''; epInput.value='5';
                syncAndRenderDomains();
            } else { 
                alert("這個任務項目已經存在囉！"); 
            }
        } 
    }
    
    function removeDomainOption(domain, optId) { 
        if(confirm("確定刪除嗎？")) { 
            appData.domainOptions[domain] = appData.domainOptions[domain].filter(o => o.id !== optId); 
            syncAndRenderDomains(); 
        } 
    }
</script>

</body>
</html>
